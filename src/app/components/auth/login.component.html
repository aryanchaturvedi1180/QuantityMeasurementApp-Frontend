<div class="auth-body">
  <div class="auth-container">
    <h3 class="text-center mb-3">Login</h3>

    <input type="email" [(ngModel)]="user.email" placeholder="Email" class="form-control mb-2" />
    <input type="password" [(ngModel)]="user.password" placeholder="Password" class="form-control mb-2" />

    <button class="btn btn-primary w-100" (click)="login()">Login</button>

    <p class="text-center mt-2">{{ message }}</p>
    <button type="button" (click)="loginWithGoogle()" class="btn btn-danger">
      Login with Google
    </button>
    <p class="text-center mt-2">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
