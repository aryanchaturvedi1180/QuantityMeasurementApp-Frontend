<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quantity Measurement</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Left Section -->
    <div class="left">
        <img src="assets/image.png" alt="shopping">
        <h2>ONLINE BOOK SHOPPING</h2>
    </div>

    <!-- Right Section -->
    <div class="right">
        <div class="tabs">
            <span class="login">LOGIN</span>
            <span class="signup active">SIGNUP</span>
        </div>

        <form>
            <label>Full Name</label>
            <input type="text">

            <label>Email Id</label>
            <input type="email">

            <label>Password</label>
            <div class="password-box">
                <input type="password">
                <span>👁️</span>
            </div>

            <label>Mobile Number</label>
            <input type="text">

            <button>Signup</button>
        </form>
    </div>

</div>

</body>
</html>
